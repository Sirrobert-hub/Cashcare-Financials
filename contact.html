<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact | Cashcare Financials</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<nav>...</nav>
<div class="container" style="padding-top: 6rem;">
  <div class="hero-grid">
    <div>
      <h1>Let’s talk about your finances.</h1>
      <p>No pressure. No jargon. Just a conversation.</p>
      <p><strong>📍 Nairobi, Kenya</strong><br>📞 +254 700 000 000<br>✉️ hello@cashcarefinancials.co.ke<br>🕒 Mon–Fri, 8am–6pm EAT</p>
    </div>
    <div>
      <form style="background:var(--white); padding:2rem; border-radius:var(--radius-md); box-shadow:var(--shadow-sm);">
        <input type="text" placeholder="Full name" required style="width:100%;padding:0.8rem;margin-bottom:1rem; border:1px solid #ddd; border-radius:8px;">
        <input type="email" placeholder="Email" required style="width:100%;padding:0.8rem;margin-bottom:1rem; border:1px solid #ddd; border-radius:8px;">
        <select style="width:100%;padding:0.8rem;margin-bottom:1rem; border:1px solid #ddd; border-radius:8px;">
          <option>Select a service</option><option>Tax Consultancy</option><option>Auditing</option><option>Bookkeeping</option>
        </select>
        <textarea rows="4" placeholder="Your message" style="width:100%;margin-bottom:1rem; border:1px solid #ddd; border-radius:8px;"></textarea>
        <button type="button" class="btn btn-primary" onclick="alert('Demo: your message has been sent. We will respond within 24 hours.')">Send message →</button>
      </form>
    </div>
  </div>
</div>
<footer>...</footer>
</body>
</html>
